<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống tiêm chủng</title>
    <style>
        .section { display: none; padding: 20px; border: 1px solid #ccc; margin-top: 10px; }
        .active { display: block; }
        .container { max-width: 600px; margin: auto; }
        button { margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="section1" class="section active">
        <h2>Phần 1: Thông tin cá nhân</h2>
        <label>Họ và Tên:</label><input type="text" id="fullname">
        <button onclick="showSection('section2')">Tiếp theo</button>
    </div>

    <div id="section2" class="section">
        <h2>Phần 2: Thông tin tiêm chủng</h2>
        <label>Loại Vaccine:</label>
        <select id="vaccineType" onchange="updateDoses()">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum">Cúm mùa</option>
            <option value="thuy-dau">Thủy đậu</option>
        </select>
        <br>
        <label>Chọn mũi:</label>
        <select id="doseSelect" disabled></select>
        <br>
        <button onclick="showSection('section1')">Quay lại</button>
        <button onclick="showSection('section3')">Tính tiền</button>
    </div>

    <div id="section3" class="section">
        <h2>Phần 3: Thanh toán</h2>
        <p>Tổng tiền: 800.000 VNĐ</p>
        <input type="checkbox" id="agree"> Tôi đồng ý.
        <br>
        <button onclick="showSection('section2')">Quay lại</button>
        <button id="submitBtn" disabled onclick="alert('Đăng ký thành công!')">Gửi</button>
    </div>
</div>

<script>

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateDoses() {
        const type = document.getElementById('vaccineType').value;
        const select = document.getElementById('doseSelect');
        select.innerHTML = '<option value="1">Mũi 1</option>' + (type === 'thuy-dau' ? '<option value="2">Mũi 2</option>' : '');
        select.disabled = (type === "");
    }

    document.getElementById('agree').addEventListener('change', function() {
        document.getElementById('submitBtn').disabled = !this.checked;
    });
</script>

</body>
</html>
