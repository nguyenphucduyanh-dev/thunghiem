<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tiêm chủng - Hệ thống Y tế</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .form-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        fieldset { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        legend { font-weight: bold; color: #007bff; padding: 0 10px; }
        .row { display: flex; gap: 20px; margin-bottom: 15px; }
        .col { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #result-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        #result-table td, #result-table th { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

<div class="form-container">
    <h1>PHIẾU ĐĂNG KÝ TIÊM CHỦNG</h1>
    
    <fieldset>
        <legend>I. Thông tin cá nhân</legend>
        <div class="row">
            <div class="col"><label>Họ và tên *</label><input type="text" id="name"></div>
            <div class="col"><label>Ngày sinh *</label><input type="date" id="dob"></div>
        </div>
        </fieldset>

    <fieldset>
        <legend>II. Thông tin tiêm chủng</legend>
        <div class="row">
            <div class="col">
                <label>Loại Vaccine *</label>
                <select id="vaccineType">
                    <option value="">-- Chọn --</option>
                    <option value="cum">Cúm mùa</option>
                    <option value="thuy-dau">Thủy đậu</option>
                </select>
            </div>
            <div class="col">
                <label>Chọn mũi *</label>
                <select id="doseNum" disabled></select>
            </div>
        </div>
        <button id="calcBtn" disabled>Tính tiền thanh toán</button>
        <div id="resultOutput"></div>
    </fieldset>

    <div style="margin-top: 20px; text-align: center;">
        <input type="checkbox" id="confirmCheck" disabled> Tôi cam đoan thông tin là chính xác
        <br><br>
        <button id="submitBtn" disabled>Gửi đăng ký</button>
    </div>
</div>

<script>
    const vaccineType = document.getElementById('vaccineType');
    const doseNum = document.getElementById('doseNum');


    const doseData = {
        'cum': ['Mũi 1'],
        'thuy-dau': ['Mũi 1', 'Mũi 2'],
        'hpv': ['Mũi 1', 'Mũi 2', 'Mũi 3']
    };

    vaccineType.addEventListener('change', function() {
        const selectedVaccine = this.value;
  
        doseNum.innerHTML = '<option value="">-- Chọn Mũi --</option>';
        
        if (selectedVaccine && doseData[selectedVaccine]) {
    
            doseNum.disabled = false;
            

            doseData[selectedVaccine].forEach((dose, index) => {
                let option = document.createElement('option');
                option.value = index + 1;
                option.text = dose;
                doseNum.appendChild(option);
            });
        } else {
   
            doseNum.disabled = true;
        }
    });
</script>

</body>
</html>
