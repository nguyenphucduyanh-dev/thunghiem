<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tiêm chủng</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>II. Thông tin tiêm chủng</h2>
        
        <div id="errorMsg" style="color: red; display: none;"></div>

        <label>Loại Vaccine:</label>
        <select id="vaccineType">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum">Cúm mùa</option>
            <option value="thuy-dau">Thủy đậu</option>
            <option value="hpv">HPV</option>
        </select>

        <label>Đăng ký mũi:</label>
        <select id="doseSelect" disabled>
            <option value="">-- Chọn Mũi --</option>
        </select>

        <button id="calcBtn" disabled>Tính tiền thanh toán</button>

        <div style="margin: 10px 0;">
            <input type="checkbox" id="agreeCheck" disabled> Tôi đồng ý...
        </div>

        <button id="submitBtn" disabled>Gửi thông tin đăng ký</button>
    </div>

    <script>
        const vaccineSelect = document.getElementById('vaccineType');
        const doseSelect = document.getElementById('doseSelect');
        const calcBtn = document.getElementById('calcBtn');
        const agreeCheck = document.getElementById('agreeCheck');
        const submitBtn = document.getElementById('submitBtn');

        vaccineSelect.addEventListener('change', () => {
            doseSelect.disabled = false; 
            doseSelect.innerHTML = '<option value="1">Mũi 1</option><option value="2">Mũi 2</option>';
        });

        doseSelect.addEventListener('change', () => {
            calcBtn.disabled = false;  
        });

        calcBtn.addEventListener('click', () => {
            alert("Đã tính tiền xong!");
            agreeCheck.disabled = false; 
        });

        agreeCheck.addEventListener('change', () => {
            submitBtn.disabled = !agreeCheck.checked;
        });

        submitBtn.addEventListener('click', () => {
            alert("ĐĂNG KÝ THÀNH CÔNG!");
        });
    </script>
</body>
</html>
