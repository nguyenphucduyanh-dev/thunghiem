<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tiêm chủng</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .wrapper { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .form-row { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; background: #ffe6e6; padding: 10px; margin-bottom: 15px; border: 1px solid red; display: none; }
        .btn-main { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        .hidden { display: none; }
        .result { padding: 15px; background: #e9ecef; margin-top: 15px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Thông tin tiêm chủng</h2>
    <div id="personal-form">
        <div class="form-row"><label>Họ và Tên (*)</label><input type="text" id="fullname"></div>
        <div class="form-row"><label>Giới tính (*)</label>
            <input type="radio" name="gender" value="Nam" checked> Nam 
            <input type="radio" name="gender" value="Nữ"> Nữ
        </div>
        <div class="form-row"><label>Ngày sinh (*)</label><input type="date" id="dob"></div>
        <div class="form-row"><label>CCCD (12 số) (*)</label><input type="text" id="cccd" maxlength="12"></div>
        <div class="form-row"><label>SĐT (*)</label><input type="text" id="phone"></div>
    </div>

    <div id="error-msg" class="error"></div>

    <div class="form-row">
        <label>Loại Vaccine</label>
        <select id="vaccine">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum">Cúm mùa</option>
            <option value="thuydau">Thủy đậu</option>
            <option value="hpv">HPV</option>
        </select>
    </div>

    <div id="vaccine-section" class="hidden">
        <div class="form-row"><label>Đăng ký mũi</label><select id="mui"><option value="">-- Chọn Mũi --</option></select></div>
        <div id="check-code-box" class="hidden"><label>Nhập mã mũi tiêm trước (9 ký tự)</label><input type="text" id="prev-code"></div>
        <div class="form-row"><label>Ngày dự kiến tiêm</label><input type="date" id="date-inject"></div>
        <button id="btn-calc" class="btn-main" disabled>Tính tiền thanh toán</button>
    </div>

    <div id="invoice-result" class="result hidden"></div>
    <div class="form-row"><input type="checkbox" id="agree" disabled> Tôi đồng ý cung cấp thông tin</div>
    <button id="btn-submit" class="btn-main" disabled>Gửi thông tin đăng ký</button>
</div>

<script>
    const data = {
        cum: { minAge: 3, doses: 1, price: 350000 },
        thuydau: { minAge: 0, maxAge: 6, doses: 2, price: 800000 },
        hpv: { price: 2500000, priceOver20: 2000000 }
    };

    function getAge(dateString) {
        return new Date().getFullYear() - new Date(dateString).getFullYear();
    }

    
    document.getElementById('vaccine').onchange = function() {
        const dob = document.getElementById('dob').value;
        const age = getAge(dob);
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const err = document.getElementById('error-msg');
        const section = document.getElementById('vaccine-section');
        const mui = document.getElementById('mui');

        if(!dob) { alert("Vui lòng nhập ngày sinh!"); this.value=""; return; }

        let isValid = false;
        let count = 0;

        if(this.value === 'cum' && age > 3) { isValid = true; count = 1; }
        else if(this.value === 'thuydau' && age >= 0 && age <= 6) { isValid = true; count = 2; }
        else if(this.value === 'hpv' && gender === 'Nữ') {
            if(age >= 11 && age <= 20) { isValid = true; count = 2; }
            else if(age > 20) { isValid = true; count = 3; }
        }

        if(isValid) {
            err.style.display = 'none'; section.classList.remove('hidden');
            mui.innerHTML = '<option value="">-- Chọn Mũi --</option>';
            for(let i=1; i<=count; i++) mui.innerHTML += `<option value="${i}">Mũi ${i}</option>`;
        } else {
            err.style.display = 'block'; err.innerText = "Lỗi: Không phù hợp độ tuổi/giới tính.";
            section.classList.add('hidden');
        }
    };

    
    document.getElementById('mui').onchange = function() {
        document.getElementById('check-code-box').classList.toggle('hidden', this.value == 1);
        document.getElementById('btn-calc').disabled = false;
    };

    
    document.getElementById('btn-calc').onclick = function() {
        const mui = document.getElementById('mui').value;
        const type = document.getElementById('vaccine').value;
        let price = (type === 'hpv' && getAge(document.getElementById('dob').value) > 20) ? 2000000 : (type === 'hpv' ? 2500000 : data[type].price);
        let discount = (price > 2000000) ? price * 0.05 : 0;
        
        document.getElementById('invoice-result').classList.remove('hidden');
        document.getElementById('invoice-result').innerHTML = `Đơn giá: ${price.toLocaleString()} VNĐ<br>Giảm giá: ${discount.toLocaleString()} VNĐ<br><b>Tổng: ${(price-discount).toLocaleString()} VNĐ</b>`;
        document.getElementById('agree').disabled = false;
    };

    document.getElementById('agree').onchange = function() {
        document.getElementById('btn-submit').disabled = !this.checked;
    };

    document.getElementById('btn-submit').onclick = function() {
        alert("ĐĂNG KÝ THÀNH CÔNG!\nHọ tên: " + document.getElementById('fullname').value);
    };
</script>
</body>
</html>
