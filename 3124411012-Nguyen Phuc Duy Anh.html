<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tiêm chủng</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ddd; }
        .hidden { display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #success-screen { padding: 20px; background: #d4edda; border: 1px solid #c3e6cb; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="form-screen">
    <h2>I. Thông tin cá nhân</h2>
    <div class="form-group"><label>Họ và tên (*)</label><input type="text" id="fullname"></div>
    <div class="form-group"><label>Giới tính</label><input type="radio" name="gender" value="Nam" checked> Nam <input type="radio" name="gender" value="Nữ"> Nữ</div>
    <div class="form-group"><label>Ngày sinh (*)</label><input type="date" id="dob"></div>
    <div class="form-group"><label>Nơi sinh (*)</label><input type="text" id="birthplace" placeholder="Tỉnh/Thành phố"></div>
    <div class="form-group"><label>CCCD (12 số) (*)</label><input type="text" id="cccd" maxlength="12" placeholder="Nhập đúng 12 số"></div>
    <div class="form-group"><label>Số điện thoại (*)</label><input type="tel" id="phone" placeholder="09xxxx hoặc 03xxxx..."></div>

    <h2>II. Thông tin tiêm chủng</h2>
    <div class="form-group">
        <label>Loại Vaccine</label>
        <select id="vaccine">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum" data-price="350000" data-doses="1">Cúm mùa (1 Mũi/Năm)</option>
            <option value="thuydau" data-price="800000" data-doses="2">Thủy đậu (2 Mũi)</option>
            <option value="hpv" data-price="2500000" data-doses="3">HPV - Gardasil 9 (3 Mũi)</option>
        </select>
    </div>
    <div class="form-group"><label>Đăng ký mũi</label><select id="mui"><option>-- Chọn Mũi --</option></select></div>
    <div id="prev-code-area" class="hidden"><label>Mã mũi trước đó</label><input type="text" id="prev-code" placeholder="M(số mũi)-XXXXXX"></div>
    <div class="form-group"><label>Ngày dự kiến tiêm</label><input type="date" id="inject-date"></div>
    
    <button id="btn-calc">Tính tiền thanh toán</button>
    <div id="result-area" style="margin: 10px 0; padding: 10px; border: 1px dashed #aaa;"></div>
    
    <div class="form-group"><input type="checkbox" id="agree"> Tôi đồng ý cung cấp thông tin</div>
    <button id="btn-submit">Gửi thông tin đăng ký</button>
</div>

<div class="container hidden" id="success-screen">
    <h2 style="color: green;">ĐĂNG KÝ THÀNH CÔNG!</h2>
    <p id="summary-info"></p>
    <button onclick="location.reload()">Đăng ký tiếp</button>
</div>

<script>
    
    const validatePersonal = () => {
        const cccd = document.getElementById('cccd').value;
        const phone = document.getElementById('phone').value;
        if(cccd.length !== 12 || isNaN(cccd)) { alert("CCCD phải đủ 12 chữ số!"); return false; }
        if(phone.length < 10) { alert("Số điện thoại không hợp lệ!"); return false; }
        return true;
    };

    
    document.getElementById('btn-submit').onclick = function() {
        if(!validatePersonal()) return;
        if(!document.getElementById('agree').checked) return alert("Vui lòng đồng ý điều khoản!");
        
        document.getElementById('form-screen').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
        document.getElementById('summary-info').innerHTML = `
            Họ tên: ${document.getElementById('fullname').value}<br>
            Nơi sinh: ${document.getElementById('birthplace').value}<br>
            Vaccine: ${document.getElementById('vaccine').options[document.getElementById('vaccine').selectedIndex].text}<br>
            Tổng tiền: ${document.getElementById('result-area').querySelector('b')?.innerText || 'Chưa tính'}`;
    };
    
    
</script>
</body>
</html>
