<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tiêm chủng</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .wrapper { max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ccc; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
        .msg { padding: 10px; margin-top: 10px; background: #e9ecef; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="wrapper" id="form-container">
    <h2>I. Thông tin cá nhân</h2>
    <div class="form-group">Họ và Tên: * <input type="text" id="fullname"></div>
    <h2>II. Thông tin tiêm chủng</h2>
    <div class="form-group">
        Loại Vaccine: 
        <select id="vaccine">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum" data-type="dinhky">Cúm mùa</option>
            <option value="hpv" data-type="lieutrinh" data-doses="3">HPV - Gardasil 9</option>
        </select>
    </div>
    <div class="form-group">Đăng ký mũi: <select id="mui" disabled><option>-- Chọn Mũi --</option></select></div>
    <div class="form-group">Ngày dự kiến tiêm: <input type="date" id="date-inject" disabled></div>
    
    <div id="check-code" class="hidden">
        Nhập mã mũi tiêm trước đó: <input type="text" id="prev-code" placeholder="VD: M1-ABCDEF">
    </div>

    <button id="btn-price" disabled>Tính tiền thanh toán</button>
    <div id="price-result" class="msg hidden"></div>
    
    <div class="form-group"><input type="checkbox" id="confirm"> Tôi đồng ý cung cấp thông tin</div>
    <button id="btn-submit" disabled>Gửi thông tin đăng ký</button>
</div>

<script>
    const vSelect = document.getElementById('vaccine');
    const muiSelect = document.getElementById('mui');
    const dateInput = document.getElementById('date-inject');

    // 1. Logic chọn Vaccine
    vSelect.onchange = () => {
        muiSelect.disabled = !vSelect.value;
        muiSelect.innerHTML = '<option>-- Chọn Mũi --</option>';
        if(vSelect.value === 'hpv') {
            for(let i=1; i<=3; i++) muiSelect.innerHTML += `<option value="${i}">Mũi ${i}</option>`;
        }
    };

    
    muiSelect.onchange = () => {
        dateInput.disabled = false;
        document.getElementById('check-code').classList.toggle('hidden', muiSelect.value == 1);
        document.getElementById('btn-price').disabled = false;
    };

    
    document.getElementById('btn-submit').onclick = function() {
    // 1. Thu thập thông tin từ form
    const name = document.getElementById('name').value;
    const vaccine = document.getElementById('vaccine').value;
    const mui = document.getElementById('mui').value;
    const total = "2.375.000 VNĐ"; // Giả định giá trị từ kết quả tính toán

    // 2. Chuyển đổi giao diện (Ẩn form, Hiện thông báo)
    document.getElementById('registration-form').style.display = 'none';
    const successScreen = document.getElementById('success-screen');
    successScreen.style.display = 'block';

    // 3. Hiển thị thông tin tóm tắt
    document.getElementById('confirmation-details').innerHTML = `
        Họ tên: ${name}<br>
        Vaccine: ${vaccine}<br>
        Mũi tiêm: ${mui}<br>
        Tổng thanh toán: ${total}
    `;
};
        
    };
</script>
</body>
</html>
