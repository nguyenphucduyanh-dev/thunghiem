<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống đăng ký tiêm chủng</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: red; background: #ffe6e6; padding: 10px; border: 1px solid red; display: none; margin-bottom: 15px; }
        .hidden { display: none; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .result-box { background: #e9ecef; padding: 15px; margin-top: 15px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div id="personal-info">
        <div class="form-group">
            <label>Họ và Tên (*)</label>
            <input type="text" id="fullname">
        </div>
        <div class="form-group">
            <label>Giới tính (*)</label>
            <input type="radio" name="gender" value="Nam" checked> Nam 
            <input type="radio" name="gender" value="Nữ"> Nữ
        </div>
        <div class="form-group">
            <label>Ngày sinh (*)</label>
            <input type="date" id="dob">
        </div>
        <div class="form-group">
            <label>Số CCCD (12 số) (*)</label>
            <input type="text" id="cccd">
        </div>
    </div>

    <hr>
    <h3>II. Thông tin tiêm chủng</h3>
    <div id="error-msg" class="error"></div>

    <div class="form-group">
        <label>Loại Vaccine</label>
        <select id="vaccine">
            <option value="">-- Chọn Vaccine --</option>
            <option value="cum">Cúm mùa</option>
            <option value="thuydau">Thủy đậu</option>
            <option value="hpv">HPV</option>
        </select>
    </div>

    <div id="vaccine-controls" class="hidden">
        <div class="form-group">
            <label>Đăng ký mũi</label>
            <select id="mui">
                <option value="">-- Chọn Mũi --</option>
            </select>
        </div>
        
        <div id="tra-soat-box" class="hidden">
            <label>Nhập mã mũi tiêm trước đó (9 ký tự)</label>
            <input type="text" id="prev-code" placeholder="VD: M1-ABCDEF">
        </div>

        <div class="form-group">
            <label>Ngày dự kiến tiêm</label>
            <input type="date" id="date-inject">
        </div>
        
        <button id="btn-calc">Tính tiền thanh toán</button>
    </div>

    <div id="payment-result" class="result-box hidden"></div>

    <div class="form-group" style="margin-top:20px;">
        <input type="checkbox" id="agree" disabled> Tôi đồng ý cung cấp thông tin cho việc tiêm chủng
    </div>
    
    <button id="btn-submit" disabled>Gửi thông tin đăng ký</button>
</div>

<script>
     
    const vacData = {
        cum: { minAge: 3, price: 350000, doses: 1 },
        thuydau: { minAge: 0, maxAge: 6, price: 800000, doses: 2 },
        hpv: { price: 2500000, priceOver20: 2000000 }
    };

    function validateAge(dob, type, gender) {
        let age = new Date().getFullYear() - new Date(dob).getFullYear();
        if (type === 'cum') return age > 3;
        if (type === 'thuydau') return age >= 0 && age <= 6;
        if (type === 'hpv') {
            if (gender !== 'Nữ') return false;
            return (age >= 11 && age <= 20) || (age > 20);
        }
        return false;
    }

    document.getElementById('vaccine').addEventListener('change', function() {
        const dob = document.getElementById('dob').value;
        const type = this.value;
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const err = document.getElementById('error-msg');
        
        if (!dob) { alert("Vui lòng nhập ngày sinh trước!"); this.value=""; return; }
        
        if (validateAge(dob, type, gender)) {
            err.style.display = 'none';
            document.getElementById('vaccine-controls').classList.remove('hidden');
            renderMuiOptions(type, dob);
        } else {
            err.innerText = "Lỗi: Khách hàng không đủ điều kiện tuổi/giới tính cho vaccine này.";
            err.style.display = 'block';
            document.getElementById('vaccine-controls').classList.add('hidden');
        }
    });

    function renderMuiOptions(type, dob) {
        const select = document.getElementById('mui');
        select.innerHTML = '<option value="">-- Chọn Mũi --</option>';
        let count = (type === 'hpv' && (new Date().getFullYear() - new Date(dob).getFullYear() > 20)) ? 3 : (type === 'thuydau' ? 2 : (type === 'hpv' ? 2 : 1));
        for(let i=1; i<=count; i++) select.innerHTML += `<option value="${i}">Mũi ${i}</option>`;
    }

   
</script>
</body>
</html>
